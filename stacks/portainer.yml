version: '3.8'
name: portainer

services:

   portainer:
      image: portainer/portainer-ce:2.20.0
      privileged: true
      ports:
         - 8000:8000
         - 9000:9000
         - 9443:9443
      volumes:
         - data:/data
         - /var/run/docker.sock:/var/run/docker.sock

volumes:
   data:
